<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web Based Supply Chain Platform – MMU Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&family=Arial&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #000000;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      text-align: center;
      border: 1.5px solid #000;
      padding: 60px 56px;
    }

    .hr {
      border: none;
      border-top: 1px solid #000;
      margin: 28px 0;
    }

    .university-name {
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    .sub-info {
      font-size: 13px;
      line-height: 2;
      text-transform: uppercase;
    }

    .project-title {
      font-size: 26px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.35;
      margin: 8px 0 4px;
    }

    .degree {
      font-size: 13.5px;
      margin-top: 6px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <div class="university-name">Multimedia University of Kenya</div>

    <hr class="hr"/>

    <div class="sub-info">
      Faculty of Computing and Information Technology<br/>
      Department of Information Technology
    </div>

    <hr class="hr"/>

    <div class="project-title">Web Based Supply Chain Platform</div>

    <hr class="hr"/>

    <div class="degree">Bachelor of Science in Computer Technology</div>

  </div>
</div>
</body>
</html>
